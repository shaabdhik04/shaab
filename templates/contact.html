{% extends 'base.html' %}

{% block title %}Contact - Portfolio{% endblock %}

{% block content %}
<main class="page-content">
    <div class="container">
        <div class="page-header">
            <h1>Contact Me</h1>
            <p>Have an opportunity, a project proposal, or just want to say hello? Drop a message below!</p>
        </div>

        <div class="contact-container card">
            <form class="contact-form" action="#" method="POST">
                <!-- Name -->
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" name="name" placeholder="John Doe" required>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label for="email">Your Email</label>
                    <input type="email" id="email" name="email" placeholder="john@example.com" required>
                </div>

                <!-- Message -->
                <div class="form-group">
                    <label for="message">Your Message</label>
                    <textarea id="message" name="message" rows="6" placeholder="Write your message here..."
                        required></textarea>
                </div>

                <!-- Submit -->
                <button type="submit" class="btn btn-primary btn-submit">Send Message</button>
            </form>
        </div>
    </div>
</main>
{% endblock %}
